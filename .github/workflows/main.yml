name: Metrics

on:
  # Schedule updates (each 18 hours)
  schedule: [{cron: "0 */18 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository (必须加 token，否则 push 可能失败)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: base
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false   # ✅ 修正点1：替换 output_action
          user: days0102
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai

          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all

          plugin_calendar: yes
          plugin_calendar_limit: 1

          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories

          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # 📅 Full-year calendar
      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 📅 Half-year calendar
      - name: half-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/isocalendar.halfyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # 🈷️ Languages activity
      - name: Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15

      # ✨ Stargazers
      - name: Using chartist charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stargazers.chartist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist

      # 🌟 Recently starred repositories
      - name: Recently starred
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 10

      # 💡 Coding habits
      - name: Recent activity charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/habits.charts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          config_timezone: Europe/Paris

      # 🎟️ Follow-up indepth
      - name: Indepth analysis followup
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/followup.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes

      # 🎭 Comment reactions
      - name: Comment reactions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/reactions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_details: percentage

      # 🧑‍🤝‍🧑 People
      - name: Followers
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/people.followers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_people: yes
          plugin_people_limit: 300
          plugin_people_size: 36
          plugin_people_types: followers, following

      # 📓 Pinned repositories
      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/repositories.pinned.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 2

      # 💬 Discussions
      - name: GitHub Discussions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/discussions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8

      # 📆 Calendar full history
      - name: Full history calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/calendar.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0

      # 🏆 Achievements
      - name: Compact display
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_achievements: yes
          plugin_achievements_only: >-
            polyglot, stargazer, sponsor, deployer, member, maintainer, developer,
            scripter, packager, explorer, infographile, manager
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

      # 📰 Activity
      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

      # 🗨️ Stack Overflow
      - name: StackOverflow
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stackoverflow.svg
          token: NOT_NEEDED
          commit: false
          base: ""
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 1
          plugin_stackoverflow_sections: answers-top
          plugin_stackoverflow_limit: 2

      # 👤 User followup
      - name: Followup user
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/followup.user.svg
          token: ${{ secrets.METRICS_TOKEN }}
          commit: false
          base: ""
          plugin_followup: yes
          plugin_followup_sections: user

      # 🧪 Debug
      - name: Debug files
        run: |
          echo "==== FILE TREE ===="
          ls -R

      # ✅ Single commit step
      - name: Native Git Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add metrics/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub metrics [skip ci]"
            git push
          fi
