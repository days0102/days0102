# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      # Checkout the repository to the runner workspace
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: base
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/base.svg
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          token: ${{ secrets.METRICS_TOKEN }}
          # Prevent automatic commit for this step
          output_action: none

          # Options
          user: days0102
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          plugin_calendar: yes
          plugin_calendar_limit: 1
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # 📅 Isometric commit calendar
      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          # Do not add base information
          base: ""
          # Enable this plugin
          plugin_isocalendar: yes
          # Set to display full year
          plugin_isocalendar_duration: full-year

      - name: half-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/isocalendar.halfyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          # Do not add base information
          base: ""
          # Enable this plugin
          plugin_isocalendar: yes
          # Set to display half year
          plugin_isocalendar_duration: half-year

      # 🈷️ Languages activity
      - name: Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15

      # ✨ Stargazers
      - name: Using chartist charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stargazers.chartist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist

      # 🌟 Recently starred repositories
      - name: Recently starred
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 10

      # 💡 Coding habits and activity
      - name: Recent activity charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/habits.charts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          config_timezone: Europe/Paris

      # 🎟️ Follow-up of issues and pull requests
      - name: Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/followup.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes

      # 🎭 Comment reactions
      - name: Comment reactions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/reactions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_details: percentage

      # 🧑‍🤝‍🧑 People
      - name: Followers
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/people.followers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_people: yes
          plugin_people_limit: 300
          plugin_people_size: 36
          plugin_people_types: followers, following

      # 📓 Featured repositories
      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/repositories.pinned.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 2

      # 💬 Discussions
      - name: GitHub Discussions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/discussions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8

      # 📆 Commit calendar
      - name: Full history calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/calendar.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0

      # 🏆 Achievements
      - name: Compact display
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_achievements: yes
          plugin_achievements_only: >-
            polyglot, stargazer, sponsor, deployer, member, maintainer, developer,
            scripter, packager, explorer, infographile, manager
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

      # 📰 Recent activity
      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create
          
      - name: Opened by user
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/followup.user.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          base: ""
          plugin_followup: yes
          plugin_followup_sections: user

      - name: Debug - Check what changed
        run: |
          echo "=== 检查 metrics 文件夹内容 ==="
          ls -la metrics/ || echo "文件夹不存在！"
          
          echo "=== 检查 Git 状态 ==="
          git status
          
          echo "=== 检查具体的 Diff ==="
          git diff

      # Commit all generated SVGs in a single commit
      - name: Commit and push metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          skip_dirty_check: false
          commit_message: "chore: update GitHub metrics [skip ci]"
